version: '3.9'
services:
  mongo:
    image: mongo:6.0
    container_name: kiva-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: kiva
      MONGO_INITDB_ROOT_USERNAME: <username>
      MONGO_INITDB_ROOT_PASSWORD: <password>
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
